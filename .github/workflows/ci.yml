name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # CPU-only torch wheels: much smaller and all tests are CPU-friendly.
  PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src tests
      - run: ruff format --check src tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage gate
        run: pytest --cov=diffusionlab --cov-report=term --cov-report=xml -q
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  smoke:
    # Real end-to-end check through the installed console script:
    # catches packaging/entry-point issues unit tests cannot see.
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install .
      - run: diffusionlab validate-config --config configs/smoke.yaml
      - run: diffusionlab train --config configs/smoke.yaml
      - run: |
          diffusionlab sample \
            --checkpoint runs/smoke/checkpoints/last.pt \
            --num-images 4 --steps 5 --seed 0 --device cpu \
            --output smoke-samples.png
      - uses: actions/upload-artifact@v4
        with:
          name: smoke-samples
          path: smoke-samples.png
